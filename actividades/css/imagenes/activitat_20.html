<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Chat</title>
</head>
<body>

    <main class="chat-container">

        <h1>Chat entre dos personas</h1>

        <section class="chat">

            <article class="mensaje">
                <img src="https://i.pravatar.cc/60?img=12" class="avatar" alt="Avatar usuario 1">
                <div class="contenido">
                    <h3 class="nombre">Laura</h3>
                    <span class="fecha">05/03/2026 - 15:40</span>
                    <p class="texto">Hola, ¿cómo va tu día? Estaba revisando el proyecto y creo que podríamos mejorar la parte visual.</p>
                </div>
            </article>

            <article class="mensaje">
                <img src="https://i.pravatar.cc/60?img=32" class="avatar" alt="Avatar usuario 2">
                <div class="contenido">
                    <h3 class="nombre">Carlos</h3>
                    <span class="fecha">05/03/2026 - 15:42</span>
                    <p class="texto">¡Buenas! Sí, totalmente de acuerdo. Podemos reorganizar la estructura y añadir algunos detalles más modernos.</p>
                </div>
            </article>

        </section>

        <template id="plantilla-mensaje">
            <article class="mensaje">
                <img class="avatar">
                <div class="contenido">
                    <h3 class="nombre"></h3>
                    <span class="fecha"></span>
                    <p class="texto"></p>
                </div>
            </article>
        </template>

    </main>

</body>
</html>
