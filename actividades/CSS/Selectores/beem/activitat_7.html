<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ACTIVITAT7</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    padding: 40px;
}

.comentarios {
    max-width: 600px;
    margin: auto;
}

h2 {
    text-align: center;
}

form {
    background: white;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 30px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 14px;
}

button {
    padding: 10px 15px;
    background-color: #2a9d8f;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background-color: #21867a;
}

.lista-comentarios {
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.comentario {
    border-bottom: 1px solid #ddd;
    padding: 10px 0;
}

.comentario:last-child {
    border-bottom: none;
}

.autor {
    font-weight: bold;
    color: #2a9d8f;
}

.fecha {
    font-size: 12px;
    color: gray;
}
</style>

</head>
<body>

<div class="comentarios">

    <h2>Deja tu comentario</h2>

    <form>
        <input type="text" placeholder="Tu nombre" required>
        <textarea rows="4" placeholder="Escribe tu comentario..." required></textarea>
        <button type="submit">Publicar</button>
    </form>

    <div class="lista-comentarios">

        <div class="comentario">
            <div class="autor">Ana</div>
            <div class="fecha">04/03/2026</div>
            <p>¡Me ha encantado el artículo!</p>
        </div>

        <div class="comentario">
            <div class="autor">Carlos</div>
            <div class="fecha">04/03/2026</div>
            <p>Muy interesante, espero más contenido como este.</p>
        </div>

    </div>

</div>

</body>
</html>
